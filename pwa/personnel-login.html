<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Personel Girişi — HGS Filo</title>
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07050f; --c1:#110d1f; --c2:#1c1535;
      --vi:#7c3aed; --vi2:#6d28d9; --va:#a78bfa;
      --txt:#f0ebff; --sub:#7c6fa0; --bdr:rgba(124,58,237,.15);
    }
    html,body { height:100%; }
    body { background:var(--bg); color:var(--txt); font-family:'Space Grotesk',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.25rem; }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse 70% 50% at 20% 20%,rgba(124,58,237,.12) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%,rgba(109,40,217,.08) 0%,transparent 60%);
    }
    .box { width:100%; max-width:400px; position:relative; z-index:1; }
    .brand { text-align:center; margin-bottom:2rem; }
    .brand-mark {
      width:72px; height:72px; border-radius:22px; margin:0 auto 1rem;
      background:linear-gradient(135deg,var(--vi),var(--vi2));
      display:flex; align-items:center; justify-content:center;
      font-size:2.2rem; box-shadow:0 8px 36px rgba(124,58,237,.35);
    }
    .brand h1 { font-size:1.55rem; font-weight:800; letter-spacing:-.03em; }
    .brand p  { font-size:.78rem; color:var(--sub); margin-top:.3rem; font-weight:500; }
    .role-badge {
      display:inline-flex; align-items:center; gap:.35rem; margin-top:.6rem;
      background:rgba(124,58,237,.12); border:1px solid rgba(124,58,237,.25);
      color:var(--va); border-radius:20px; padding:.28rem .85rem;
      font-size:.68rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    }
    .card { background:var(--c1); border:1px solid var(--bdr); border-radius:24px; padding:2rem; }
    .card-head { font-size:1rem; font-weight:800; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid var(--bdr); display:flex; align-items:center; gap:.55rem; }
    .card-head .ico { width:28px; height:28px; border-radius:8px; background:rgba(124,58,237,.15); display:flex; align-items:center; justify-content:center; font-size:.9rem; }
    .field { margin-bottom:1rem; }
    label { display:block; font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--sub); margin-bottom:.4rem; }
    input[type=email], input[type=password] {
      width:100%; background:var(--c2); border:1.5px solid var(--bdr); border-radius:12px;
      color:var(--txt); padding:.85rem 1rem; font-size:.95rem; font-weight:500;
      font-family:'Space Grotesk',sans-serif; outline:none; transition:border-color .2s,box-shadow .2s;
    }
    input[type=email]:focus, input[type=password]:focus {
      border-color:rgba(124,58,237,.55); box-shadow:0 0 0 3px rgba(124,58,237,.1);
    }
    .btn {
      width:100%; padding:.95rem; border:none; border-radius:14px;
      font-size:.92rem; font-weight:700; font-family:'Space Grotesk',sans-serif;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      gap:.5rem; transition:all .15s; margin-top:1.25rem;
    }
    .btn:active { transform:scale(.97); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-vi { background:linear-gradient(135deg,var(--vi),var(--vi2)); color:#fff; box-shadow:0 4px 22px rgba(124,58,237,.35); }
    .btn-vi:hover:not(:disabled) { box-shadow:0 6px 30px rgba(124,58,237,.5); }
    .msg { padding:.7rem 1rem; border-radius:12px; font-size:.82rem; font-weight:500; margin-top:.75rem; line-height:1.5; }
    .msg.err { background:rgba(239,68,68,.08); color:#ef4444; border:1px solid rgba(239,68,68,.2); }
    .msg.ok  { background:rgba(124,58,237,.08); color:var(--va); border:1px solid rgba(124,58,237,.2); }
    .sp { width:16px; height:16px; border:2px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .sep { display:flex; align-items:center; gap:.75rem; margin:1.35rem 0 0; font-size:.7rem; color:var(--sub); }
    .sep::before,.sep::after { content:''; flex:1; height:1px; background:var(--bdr); }
    .links { display:flex; flex-direction:column; gap:.4rem; margin-top:.75rem; }
    .back-link { display:flex; align-items:center; justify-content:center; gap:.4rem; font-size:.75rem; font-weight:600; color:var(--sub); text-decoration:none; cursor:pointer; transition:color .2s; padding:.3rem; }
    .back-link:hover { color:var(--va); }
  </style>
</head>
<body>
<div class="box">
  <div class="brand">
    <div class="brand-mark">👤</div>
    <h1>HGS Filo</h1>
    <p>Personel Yönetim Paneli</p>
    <div class="role-badge">👤 Personel Girişi</div>
  </div>
  <div class="card">
    <div class="card-head"><div class="ico">🔑</div>Personel Girişi</div>
    <div class="field">
      <label>E-posta</label>
      <input type="email" id="email" autocomplete="email" placeholder="personel@sirket.com"
        onkeydown="if(event.key==='Enter')document.getElementById('pass').focus()">
    </div>
    <div class="field">
      <label>Şifre</label>
      <input type="password" id="pass" autocomplete="current-password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-vi" id="btn-login" onclick="doLogin()">Giriş Yap</button>
    <div id="msg"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyB6JddjggHwCbK076wGLhZuWN3bQpwPbGk",
  authDomain: "hgs-system.firebaseapp.com",
  projectId: "hgs-system",
  storageBucket: "hgs-system.firebasestorage.app",
  messagingSenderId: "667151410768",
  appId: "1:667151410768:web:ebd17e5b7cc2e7f4991355"
});
const auth = firebase.auth();
const db   = firebase.firestore();

function setMsg(type, text) {
  const el = document.getElementById('msg');
  el.className = 'msg ' + type;
  el.textContent = text;
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('btn-login');
  if (!email || !pass) { setMsg('err','E-posta ve şifre girin'); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="sp"></div>';
  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    const doc  = await db.collection('user').doc(cred.user.uid).get();
    if (!doc.exists) {
      await auth.signOut();
      setMsg('err','Hesap profili bulunamadı. Admin ile iletişime geçin.');
      btn.disabled = false; btn.textContent = 'Giriş Yap';
      return;
    }
    const role = doc.data()?.role;
    if (!['personnel','admin','manager'].includes(role)) {
      await auth.signOut();
      setMsg('err', role
        ? `"${role}" rolündeki hesap personel paneline erişemez`
        : 'Hesaba rol atanmamış. Admin ile iletişime geçin.');
      btn.disabled = false; btn.textContent = 'Giriş Yap';
      return;
    }
    location.href = 'personnel.html';
  } catch(e) {
    const codes = {
      'auth/user-not-found':'Kullanıcı bulunamadı',
      'auth/wrong-password':'Şifre hatalı',
      'auth/invalid-email':'Geçersiz e-posta',
      'auth/too-many-requests':'Çok fazla deneme, bekleyin',
      'auth/invalid-credential':'E-posta veya şifre hatalı'
    };
    setMsg('err', codes[e.code] || e.message);
    btn.disabled = false; btn.textContent = 'Giriş Yap';
  }
}

auth.onAuthStateChanged(async user => {
  if (!user) return;
  const doc  = await db.collection('user').doc(user.uid).get();
  const role = doc.data()?.role;
  if (['personnel','admin','manager'].includes(role)) location.href = 'personnel.html';
});
</script>
</body>
</html>
