<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Şube Girişi — HGS Filo</title>
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0b0e1a; --s1:#111828; --s2:#1a2035; --tl:#00d4aa; --txt:#eef2ff; --sub:#6b7a99; --bdr:rgba(255,255,255,0.06); --acc:#00d4aa; --acc2:#3b82f6; }
    html,body { height:100%; }
    body { background:var(--bg); color:var(--txt); font-family:'Space Grotesk',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.25rem; }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background: radial-gradient(ellipse 70% 50% at 10% 10%,rgba(0,212,170,.08) 0%,transparent 60%),
                  radial-gradient(ellipse 50% 40% at 90% 90%,rgba(59,130,246,.06) 0%,transparent 60%);
    }
    .box { width:100%; max-width:400px; position:relative; z-index:1; }
    .brand { text-align:center; margin-bottom:2rem; }
    .brand-mark { width:68px; height:68px; border-radius:20px; background:linear-gradient(135deg,var(--tl),var(--acc2)); display:inline-flex; align-items:center; justify-content:center; font-size:2rem; margin-bottom:1rem; box-shadow:0 8px 32px rgba(0,212,170,.25); }
    .brand h1 { font-size:1.5rem; font-weight:800; letter-spacing:-.03em; }
    .brand p  { font-size:.78rem; color:var(--sub); margin-top:.3rem; font-weight:500; }
    .role-badge { display:inline-flex; align-items:center; gap:.35rem; background:rgba(0,212,170,.1); border:1px solid rgba(0,212,170,.2); color:var(--tl); border-radius:20px; padding:.25rem .8rem; font-size:.68rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; margin-top:.5rem; }
    .card { background:var(--s1); border:1px solid var(--bdr); border-radius:24px; padding:2rem; }
    .card-head { font-size:1rem; font-weight:800; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid var(--bdr); display:flex; align-items:center; gap:.55rem; }
    .card-head .ico { width:28px; height:28px; border-radius:8px; background:rgba(0,212,170,.12); display:flex; align-items:center; justify-content:center; font-size:.9rem; }
    .field { margin-bottom:1rem; }
    label { display:block; font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--sub); margin-bottom:.4rem; }
    input[type=email],input[type=password] { width:100%; background:var(--s2); border:1.5px solid var(--bdr); border-radius:12px; color:var(--txt); padding:.85rem 1rem; font-size:.95rem; font-weight:500; font-family:'Space Grotesk',sans-serif; outline:none; transition:border-color .2s,box-shadow .2s; }
    input[type=email]:focus,input[type=password]:focus { border-color:rgba(0,212,170,.45); box-shadow:0 0 0 3px rgba(0,212,170,.08); }
    .btn { width:100%; padding:.95rem; border:none; border-radius:14px; font-size:.92rem; font-weight:700; font-family:'Space Grotesk',sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:.5rem; transition:all .15s; margin-top:1.25rem; }
    .btn:active { transform:scale(.97); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-tl { background:linear-gradient(135deg,var(--tl),var(--acc2)); color:#fff; box-shadow:0 4px 20px rgba(0,212,170,.25); }
    .msg { padding:.7rem 1rem; border-radius:12px; font-size:.82rem; font-weight:500; margin-top:.75rem; line-height:1.5; }
    .msg.err  { background:rgba(255,107,53,.08); color:#ff6b35; border:1px solid rgba(255,107,53,.2); }
    .msg.ok   { background:rgba(0,212,170,.08); color:var(--tl); border:1px solid rgba(0,212,170,.2); }
    .sp { width:16px; height:16px; border:2px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .sep { display:flex; align-items:center; gap:.75rem; margin:1.25rem 0 0; font-size:.7rem; color:var(--sub); }
    .sep::before,.sep::after { content:''; flex:1; height:1px; background:var(--bdr); }
    .back-link { display:flex; align-items:center; justify-content:center; gap:.4rem; margin-top:1rem; font-size:.75rem; font-weight:600; color:var(--sub); text-decoration:none; cursor:pointer; transition:color .2s; }
    .back-link:hover { color:var(--tl); }
  </style>
</head>
<body>
<div class="box">
  <div class="brand">
    <div class="brand-mark">🏢</div>
    <h1>Şube Paneli</h1>
    <p>HGS Filo Yönetim Sistemi</p>
    <div class="role-badge">🏢 Şube Müdürü Girişi</div>
  </div>
  <div class="card">
    <div class="card-head"><div class="ico">🔐</div>Şube Girişi</div>
    <div class="field">
      <label>E-posta</label>
      <input type="email" id="email" autocomplete="email" placeholder="sube@sirket.com" onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
    </div>
    <div class="field">
      <label>Şifre</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-tl" id="btn-login" onclick="doLogin()">🏢 Giriş Yap</button>
    <div id="msg-login"></div>
    <div class="sep">veya</div>
    <a class="back-link" href="admin-login.html">← Admin girişine git</a>
    <a class="back-link" href="login.html">← Kullanıcı girişine git</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB6JddjggHwCbK076wGLhZuWN3bQpwPbGk",
  authDomain: "hgs-system.firebaseapp.com",
  projectId: "hgs-system",
  storageBucket: "hgs-system.firebasestorage.app",
  messagingSenderId: "667151410768",
  appId: "1:667151410768:web:ebd17e5b7cc2e7f4991355"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

auth.onAuthStateChanged(async fbUser => {
  if (!fbUser) return;
  const doc = await db.collection('user').doc(fbUser.uid).get();
  const role = doc.data()?.role || 'user';
  if (role === 'manager' || role === 'admin') location.href = 'manager.html';
  else location.href = 'index.html';
});

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showMsg('err','E-posta ve şifre girin'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.innerHTML = '<div class="sp"></div>Giriş yapılıyor…';

  try {
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    const cred = await auth.signInWithEmailAndPassword(email, password);
    const doc  = await db.collection('user').doc(cred.user.uid).get();
    const role = doc.data()?.role || 'user';

    if (role === 'manager') {
      showMsg('ok', '✅ Giriş başarılı! Yönlendiriliyorsunuz…');
      setTimeout(() => location.href = 'manager.html', 700);
    } else if (role === 'admin') {
      showMsg('ok', '✅ Giriş başarılı! Yönlendiriliyorsunuz…');
      setTimeout(() => location.href = 'manager.html', 700);
    } else {
      await auth.signOut();
      showMsg('err', '❌ Bu hesabın şube müdürü yetkisi yok.');
      btn.disabled = false; btn.innerHTML = '🏢 Giriş Yap';
    }
  } catch(e) {
    let msg = '❌ E-posta veya şifre hatalı';
    if (e.code === 'auth/too-many-requests') msg = '❌ Çok fazla deneme. Lütfen bekleyin.';
    showMsg('err', msg);
    btn.disabled = false; btn.innerHTML = '🏢 Giriş Yap';
  }
}

function showMsg(type, text) {
  document.getElementById('msg-login').innerHTML = `<div class="msg ${type}">${text}</div>`;
}
</script>
</body>
</html>
